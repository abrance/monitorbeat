name: monitorbeat CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Lint (gofmt)
        run: make lint

      - name: Test
        run: make test-verbose

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t monitorbeat:ci .

      - name: Verify image size
        run: |
          SIZE=$(docker images monitorbeat:ci --format '{{.Size}}')
          echo "Image size: $SIZE"
