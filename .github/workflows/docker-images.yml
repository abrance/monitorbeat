# GitHub Actions — 构建 Docker 镜像并推送到 ghcr.io
#
# 触发：
#   - push to main → build + tag sha & latest
#   - tag v*      → build + tag sha & semver
#   - PR          → build only (不 push)
#
# 产出镜像：
#   ghcr.io/abrance/monitorbeat:sha-<short>  (agent)
#   ghcr.io/abrance/monitorweb:sha-<short>   (web dashboard)
#   ghcr.io/abrance/monitorbeat:latest        (main)
#   ghcr.io/abrance/monitorweb:latest         (main)

name: Docker images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BEAT_IMAGE: ghcr.io/${{ github.repository_owner }}/monitorbeat
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/monitorweb

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata (monitorbeat)
        id: meta-beat
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BEAT_IMAGE }}
          tags: |
            type=sha,prefix=sha-,suffix=,format=short
            type=ref,event=branch,suffix=-branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker metadata (monitorweb)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=sha-,suffix=,format=short
            type=ref,event=branch,suffix=-branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push monitorbeat
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-beat.outputs.tags }}
          labels: ${{ steps.meta-beat.outputs.labels }}

      - name: Build & push monitorweb
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.monitorweb
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
