# Default values for monitorbeat helm chart.

# -- monitorbeat agent (DaemonSet) on each node
monitorbeat:
  image: abrance/monitorbeat:sha-336dd00
  pullPolicy: IfNotPresent
  extraArgs: []
  extraEnv: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    enabled: false
    existingClaim: ""
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: "local-path"
  nodeSelector: {}
  tolerations: []
  # monitorbeat 的输出等 YAML 配置
  config:
    check_interval: 5s
    event_buffer_size: 1024
    outputs:
      - type: http
        url: "http://vmtest-1-victoria-metrics-cluster-vminsert.bkbase-test.svc.cluster.local:8480/insert/0/prometheus/api/v1/import"
        method: POST
        format: victoriametrics
        timeout: 10s
        retry_max: 3
    basereports:
      - task_id: 1
        enabled: true
        period: 30s
        timeout: 5s
        cpu:
          info_period: 1s
        mem:
          enabled: true
        disk:
          enabled: true
          paths: ["/host"]
        load:
          enabled: true
        net:
          enabled: true
    pings:
      - task_id: 1001
        enabled: true
        target: "186.241.120.132"
        backend: command
        period: 30s
        timeout: 10s
        count: 3
        payload_size: 56
        max_rtt: 1s
        send_interval: 200ms

# -- monitorweb (Deployment) — VictoriaMetrics 查询代理 + 前端
monitorweb:
  image: abrance/monitorweb:sha-336dd00
  pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  persistence:
    enabled: false
    existingClaim: ""
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: "local-path"
  nodeSelector: {}
  tolerations: []
  config:
    listen: "0.0.0.0:8080"
    victoriametrics:
      url: "http://vmtest-1-victoria-metrics-cluster-vmselect.bkbase-test.svc.cluster.local:8481/select/0/prometheus"
      timeout: 15s
    ui_dir: "/usr/local/share/monitorweb/ui"
    alerts:
      db_path: "/data/alerts.db"

  # -- monitorweb Ingress (Traefik + cert-manager)
  ingress:
    enabled: true
    host: monitorbeat.xiaoyxq.top
    # tlsSecretName: ""  # 默认由 host 自动生成：host 点转横线 + "-tls"
    annotations: {}

# -- 命名 override
nameOverride: ""
fullnameOverride: ""
