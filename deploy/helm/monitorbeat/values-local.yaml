# Local k3s 部署专用 values 文件
#
# 用法：
#   helm upgrade --install mon ./deploy/helm/monitorbeat \
#     -n monitorbeat --create-namespace \
#     -f deploy/helm/monitorbeat/values-local.yaml
#
# 本文件固定了线上实际使用的镜像 tag 与所有运行参数。
# chart 默认的 values.yaml 仅作模板参考，实际以本文件为准。
# 更新镜像时只需改下面两处 image 字段（或 helm upgrade --set）。

# -- monitorbeat agent (DaemonSet)
monitorbeat:
  image: ghcr.io/abrance/monitorbeat:sha-6b726f3
  pullPolicy: IfNotPresent
  persistence:
    enabled: true
    existingClaim: "monitorbeat-beat-data"
  extraArgs: []
  extraEnv: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  config:
    check_interval: 5s
    event_buffer_size: 1024
    registry:
      url: "http://mon-monitorbeat-web.monitorbeat.svc.cluster.local:8080/api/v1/registry/heartbeat"
      interval: 30s
    outputs:
      - type: http
        url: "http://vmtest-1-victoria-metrics-cluster-vminsert.bkbase-test.svc.cluster.local:8480/insert/0/prometheus/api/v1/import"
        method: POST
        format: victoriametrics
        timeout: 10s
        retry_max: 3
    basereports:
      - task_id: 1
        enabled: true
        period: 30s
        timeout: 5s
        cpu:
          info_period: 1s
        mem:
          enabled: true
        disk:
          enabled: true
          paths: ["/host"]
        load:
          enabled: true
        net:
          enabled: true
    pings:
      - task_id: 1001
        enabled: true
        target: "186.241.120.132"
        backend: command
        period: 30s
        timeout: 10s
        count: 3
        payload_size: 56
        max_rtt: 1s
        send_interval: 200ms

# -- monitorweb (Deployment) — VM 查询代理 + 前端 + Agent Registry
monitorweb:
  image: ghcr.io/abrance/monitorweb:sha-6b726f3
  pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  persistence:
    enabled: true
    existingClaim: "monitorbeat-web-data"
  nodeSelector: {}
  tolerations: []
  config:
    listen: "0.0.0.0:8080"
    db_path: "/data/monitorweb.db"
    victoriametrics:
      url: "http://vmtest-1-victoria-metrics-cluster-vmselect.bkbase-test.svc.cluster.local:8481/select/0/prometheus"
      timeout: 15s
    ui_dir: "/usr/local/share/monitorweb/ui"
    alerts:
      eval_interval: 60s
    registry:
      ttl: 90s
    smtp:
      host: "smtp.qq.com"
      port: 587
      username: "1103098607@qq.com"
      password: "yjlgdmpaxlhmhbhj"
      from: "1103098607@qq.com"
      to:
        - "1103098607@qq.com"
      insecure: false
  ingress:
    enabled: true
    host: monitorbeat.xiaoyxq.top
    annotations: {}

nameOverride: ""
fullnameOverride: ""
